<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body {
    background-color: brown;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}


.container {
    background-color: lightblue;
    width: 550px;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 3px 3px 5px grey;
}


h1 {
    text-align: center;
    margin-bottom: 15px;
}


.form-group {
    display: flex;
    align-items: center;
    margin: 8px 0;
}


.form-group label {
    width: 120px;
    font-weight: bold;
}


.form-group input {
    flex: 1;
    height: 25px;
    border-radius: 5px;
    border: 1px solid gray;
    padding: 5px;
}


.gender input {
    margin-left: 10px;
}


.btn {
    text-align: center;
    margin-top: 15px;
}

.btn input {
    height: 35px;
    width: 120px;
    border-radius: 5px;
    border: none;
    background-color: black;
    color: white;
    cursor: pointer;
}

.btn input:hover {
    background-color: green;
}


.links {
    text-align: center;
    margin-top: 10px;
}

.links a {
    margin: 0 10px;
    text-decoration: none;
    color: blue;
}
</style>

</head>
<body>

<div class="container">

<h1>Register Yourself</h1>

<form action="register" method="post">

<div class="form-group">
<label>EmpId:</label>
<input type="text" name="empId"/>
</div>

<div class="form-group">
<label>Name:</label>
<input type="text" name="empName"/>
</div>

<div class="form-group">
<label>Email:</label>
<input type="email" name="empEmail"/>
</div>

<div class="form-group">
<label>Password:</label>
<input type="password" name="empPwd"/>
</div>

<div class="form-group">
<label>Age:</label>
<input type="text" name="empAge"/>
</div>

<div class="form-group gender">
<label>Gender:</label>
<input type="radio" name="empGender" value="male"/> Male
<input type="radio" name="empGender" value="female"/> Female
</div>

<div class="form-group">
<label>Salary:</label>
<input type="text" name="empSalary"/>
</div>

<div class="form-group">
<label>Role:</label>
<input type="text" name="empRole"/>
</div>

<div class="form-group">
<label>Address:</label>
<input type="text" name="empAddress"/>
</div>

<div class="form-group">
<label>Phone:</label>
<input type="text" name="empPhone"/>
</div>

<div class="btn">
<input type="submit" value="Register"/>
</div>

</form>

<div class="links">
<a href="Home.jsp">Home</a>

</div>

</div>

</body>
</html>
